services:
  - type: web
    name: mariusciobanunautilus-transport-break-even-engine
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: WORKSPACE_NAME
        value: Transport Workspace
      - key: CORS_ORIGIN
        value: https://mariusciobanunautilus-transport-break-f3sc.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
  - type: web
    name: mariusciobanunautilus-transport-break-even-engine-1
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE
        value: https://mariusciobanunautilus-transport-break.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
